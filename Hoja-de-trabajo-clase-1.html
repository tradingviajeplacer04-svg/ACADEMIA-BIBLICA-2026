                id: 1,
                question: "¿Cuál es la característica principal de la poesía hebrea?",
                options: [
                    { id: 'a', text: "La rima de sonidos al final de cada verso." },
                    { id: 'b', text: "El uso de una métrica estricta de sílabas." },
                    { id: 'c', text: "El paralelismo o \"rima de ideas\"." },
                    { id: 'd', text: "El uso exclusivo de instrumentos musicales." }
                ],
                correctAnswer: 'c',
                explanation: "La poesía hebrea se basa en el paralelismo de ideas."
            },
            {
                id: 2,
                question: "¿Qué libro trata específicamente el misterio del sufrimiento del justo?",
                options: [
                    { id: 'a', text: "Salmos." },
                    { id: 'b', text: "Eclesiastés." },
                    { id: 'c', text: "Job." },
                    { id: 'd', text: "Proverbios." }
                ],
                correctAnswer: 'c',
                explanation: "El libro de Job explora el sufrimiento humano ante la soberanía de Dios."
            },
            {
                id: 3,
                question: "El libro de Lamentaciones fue escrito en el contexto de:",
                options: [
                    { id: 'a', text: "La victoria de David sobre los filisteos." },
                    { id: 'b', text: "La dedicación del templo de Salomón." },
                    { id: 'c', text: "La destrucción de Jerusalén en el 586 a.C." },
                    { id: 'd', text: "El regreso del exilio babilónico." }
                ],
                correctAnswer: 'c',
                explanation: "Expresa dolor por la caída de Jerusalén."
            },
            {
                id: 4,
                question: "¿Cuál es el \"principio de la sabiduría\" según el libro de Proverbios?",
                options: [
                    { id: 'a', text: "El estudio constante de la ley." },
                    { id: 'b', text: "El temor de Jehová." },
                    { id: 'c', text: "La experiencia de los ancianos." },
                    { id: 'd', text: "La prosperidad material." }
                ],
                correctAnswer: 'b',
                explanation: "Proverbios 1:7 indica que el temor de Dios es el inicio de todo saber."
            }
        ];

        let answers = {};
        let isSubmitted = false;
        let score = 0;

        function renderApp() {
            const app = document.getElementById('app');
            const allAnswered = Object.keys(answers).length === quizData.length;

            let html = `
                <div class="max-w-3xl mx-auto space-y-8">
                    <header class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-2 bg-[#741b1b]"></div>
                        
                        <!-- Contenedor del Logo -->
                        <div class="flex justify-center mb-6">
                            <img src="${URL_DE_TU_LOGO}" alt="Logo" class="logo-img" onerror="this.src='https://img.icons8.com/fluency/96/book.png'">
                        </div>

                        <h2 class="text-sm font-bold tracking-wider text-slate-400 uppercase mb-2">Hoja de Trabajo • Clase 1</h2>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-2">Introducción a los Libros Poéticos</h1>
                        <p class="text-slate-500 max-w-xl mx-auto mt-4">
                            Selecciona las respuestas correctas para completar la actividad.
                        </p>
                    </header>

                    <div class="space-y-6">
                        <div class="flex items-center gap-2 mb-6">
                            <div class="bg-[#741b1b]/10 text-[#741b1b] px-3 py-1 rounded-full text-sm font-semibold">
                                I. Selección Múltiple
                            </div>
                            <div class="h-px bg-slate-200 flex-1"></div>
                        </div>
            `;

            quizData.forEach((q, index) => {
                html += `
                    <div class="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-100">
                        <h3 class="text-lg font-semibold text-slate-800 mb-6 flex gap-3">
                            <span class="text-[#741b1b]">${index + 1}.</span>
                            ${q.question}
                        </h3>
                        <div class="space-y-3">
                `;

                q.options.forEach((opt) => {
                    const isSelected = answers[q.id] === opt.id;
                    const isCorrect = opt.id === q.correctAnswer;
                    
                    let optionClass = "w-full text-left p-4 rounded-xl border-2 transition-all flex items-center gap-4 option-btn ";
                    let iconHtml = `<div class="w-6 h-6 rounded-full border-2 border-slate-300 flex-shrink-0 flex items-center justify-center text-xs font-bold text-slate-400">${opt.id.toUpperCase()}</div>`;

                    if (isSubmitted) {
                        if (isCorrect) {
                            optionClass += "bg-emerald-50 border-emerald-500 text-emerald-900";
                            iconHtml = `<i data-lucide="check-circle" class="w-6 h-6 text-emerald-500"></i>`;
                        } else if (isSelected) {
                            optionClass += "bg-red-50 border-red-400 text-red-900";
                            iconHtml = `<i data-lucide="x-circle" class="w-6 h-6 text-red-500"></i>`;
                        } else {
                            optionClass += "border-slate-100 opacity-60";
                        }
                    } else {
                        optionClass += isSelected ? "bg-[#741b1b]/5 border-[#741b1b] text-[#741b1b]" : "border-slate-100 hover:bg-slate-50";
                        if (isSelected) {
                            iconHtml = `<div class="w-6 h-6 rounded-full bg-[#741b1b] text-white flex items-center justify-center text-xs font-bold">${opt.id.toUpperCase()}</div>`;
                        }
                    }

                    html += `
                        <button data-qid="${q.id}" data-oid="${opt.id}" class="${optionClass}" ${isSubmitted ? 'disabled' : ''}>
                            ${iconHtml}
                            <span class="flex-1">${opt.text}</span>
                        </button>
                    `;
                });

                if (isSubmitted) {
                    const isCorrectAnswer = answers[q.id] === q.correctAnswer;
                    html += `
                        <div class="mt-6 p-4 rounded-xl text-sm ${isCorrectAnswer ? 'bg-emerald-50 text-emerald-800' : 'bg-slate-100 text-slate-600'} flex gap-3">
                            <i data-lucide="info" class="w-5 h-5 flex-shrink-0"></i>
                            <div>
                                <span class="font-bold block">${isCorrectAnswer ? '¡Correcto!' : 'Respuesta correcta: ' + q.correctAnswer.toUpperCase()}</span>
                                ${q.explanation}
                            </div>
                        </div>
                    `;
                }
                html += `</div></div>`;
            });

            html += `
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 text-center">
                    ${!isSubmitted ? `
                        <button id="submit-btn" class="px-8 py-3 rounded-xl font-bold text-lg transition-all ${allAnswered ? 'bg-[#741b1b] text-white hover:bg-[#5a1515]' : 'bg-slate-200 text-slate-400'}" ${!allAnswered ? 'disabled' : ''}>
                            Evaluar Respuestas
                        </button>
                    ` : `
                        <div class="space-y-4">
                            <h3 class="text-2xl font-bold text-[#741b1b]">Puntuación: ${score} / ${quizData.length}</h3>
                            <button id="reset-btn" class="px-6 py-2 rounded-xl font-semibold text-[#741b1b] bg-[#741b1b]/5 hover:bg-[#741b1b]/10 transition-colors">
                                Reintentar
                            </button>
                        </div>
                    `}
                </div>
            </div>`;

            app.innerHTML = html;
            lucide.createIcons();
        }

        document.addEventListener('click', (e) => {
            const optionBtn = e.target.closest('.option-btn');
            if (optionBtn && !isSubmitted) {
                answers[optionBtn.dataset.qid] = optionBtn.dataset.oid;
                renderApp();
            }
            if (e.target.id === 'submit-btn') {
                score = quizData.reduce((acc, q) => acc + (answers[q.id] === q.correctAnswer ? 1 : 0), 0);
                isSubmitted = true;
                renderApp();
            }
            if (e.target.id === 'reset-btn') {
                answers = {}; isSubmitted = false; score = 0;
                renderApp();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        renderApp();
    </script>
</body>
</html>
